<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>新增 NXC 到錢包</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-dark: #03010a;
            --primary: #a370ff;
            --secondary: #00ffcc;
            --glass: rgba(255, 255, 255, 0.03);
            --border: rgba(255, 255, 255, 0.08);
        }
        body { margin: 0; background: radial-gradient(circle at center, #110526 0%, #03010a 100%); font-family: 'Plus Jakarta Sans', sans-serif; color: #fff; text-align: center; padding-top: 100px; }
        header { position: fixed; top: 0; width: 100%; height: 70px; display: flex; align-items: center; justify-content: space-between; padding: 0 50px; background: rgba(7, 2, 20, 0.6); backdrop-filter: blur(15px); border-bottom: 1px solid var(--border); box-sizing: border-box; z-index: 1000; }
        .logo { height: 32px; }
        .btn-connect { padding: 8px 20px; border-radius: 20px; background: transparent; color: var(--secondary); border: 1px solid rgba(0, 255, 204, 0.3); cursor: pointer; font-family: inherit; font-weight: 600; }
        
        .container { max-width: 500px; margin: 0 auto; background: var(--glass); border: 1px solid var(--border); padding: 40px; border-radius: 20px; backdrop-filter: blur(15px); }
        h1 { font-size: 28px; margin-bottom: 20px; }
        .add-btn { display: block; width: 100%; padding: 15px; margin: 20px 0; border-radius: 12px; border: none; background: linear-gradient(135deg, #a370ff, #6366f1); color: white; font-weight: 700; cursor: pointer; font-size: 16px; transition: 0.3s; }
        .add-btn:hover { transform: scale(1.02); }
        
        .panel { margin-top: 30px; text-align: left; background: rgba(0,0,0,0.2); padding: 20px; border-radius: 12px; border: 1px solid var(--border); }
        .mrow { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid var(--border); font-size: 14px; }
        .copy-btn { background: none; border: 1px solid var(--secondary); color: var(--secondary); padding: 2px 8px; border-radius: 4px; cursor: pointer; font-size: 11px; }
    </style>
</head>
<body>
    <header>
        <a href="index.html"><img class="logo" src="https://neoxcoin.github.io/XNXC.png"></a>
        <button class="btn-connect" id="connect-btn">Connect Wallet</button>
    </header>

    <div class="container">
        <h1>Add NXC Token</h1>
        <button class="add-btn" onclick="addNxc()">Add NXC to MetaMask</button>
        
        <div class="panel">
            <div class="mrow"><span>Contract:</span> <span id="addr">0x9C17fDa33CBEe4aE3768252Fd62156034F42B40B</span> <button class="copy-btn" onclick="copyAddr()">Copy</button></div>
            <div class="mrow"><span>Symbol:</span> <span>NXC</span></div>
        </div>
    </div>

    <script>
        // 1. 連接錢包
        document.getElementById('connect-btn').addEventListener('click', async () => {
            const accounts = await window.ethereum.request({ method: 'eth_requestAccounts' });
            document.getElementById('connect-btn').innerText = accounts[0].substring(0,6) + "...";
        });

        // 2. 新增代幣
        async function addNxc() {
            try {
                await window.ethereum.request({ 
                    method: 'wallet_watchAsset', 
                    params: { 
                        type: 'ERC20', 
                        options: { 
                            address: '0x9C17fDa33CBEe4aE3768252Fd62156034F42B40B', 
                            symbol: 'NXC', 
                            decimals: 18,
                            image: 'https://neoxcoin.github.io/XNXC.png'
                        } 
                    } 
                });
            } catch(e) { alert("請確保已連接錢包或使用 MetaMask 瀏覽器"); }
        }

        // 3. 複製功能
        function copyAddr() {
            navigator.clipboard.writeText("0x9C17fDa33CBEe4aE3768252Fd62156034F42B40B");
            alert("地址已複製！");
        }
    </script>
</body>
</html>
