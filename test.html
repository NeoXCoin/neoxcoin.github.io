<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NeoX 元宇宙展覽</title>
    <!-- Favicon -->
    <link rel="icon" type="image/png" href="https://neoxcoin.github.io/XNXC.png">
    
    <!-- 引入 Font Awesome 用於顯示社交媒體圖標（如 Twitter, Discord） -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --bg-dark: #070214;
            --primary: #8a2be2;
            --secondary: #00ffcc;
            --text: #ffffff;
            --text-muted: #a0aec0;
            --glass: rgba(255, 255, 255, 0.03);
            --border: rgba(255, 255, 255, 0.08);
            --font-stack: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text);
            font-family: var(--font-stack);
            overflow-x: hidden;
            background-image: 
                radial-gradient(circle at 10% 20%, rgba(138, 43, 226, 0.15) 0%, transparent 40%),
                radial-gradient(circle at 90% 80%, rgba(0, 255, 204, 0.1) 0%, transparent 40%);
            background-attachment: fixed;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        /* 1. Sticky Header */
        header {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 70px;
            background: rgba(7, 2, 20, 0.7);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 40px;
            z-index: 1000;
        }

        .nav-logo {
            height: 35px;
            cursor: pointer;
            transition: transform 0.2s;
        }

        .nav-logo:hover {
            transform: scale(1.05);
        }

        .header-right {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .language-switch {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 13px;
        }

        .language-switch a {
            color: var(--text-muted);
            text-decoration: none;
            transition: color 0.2s;
            font-weight: 500;
        }

        .language-switch a:hover, .language-switch a.active {
            color: var(--secondary);
        }

        .lang-sep {
            color: rgba(255, 255, 255, 0.2);
        }

        .btn-connect {
            background: linear-gradient(135deg, var(--primary), #4b0082);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 999px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 0 4px 15px rgba(138, 43, 226, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .btn-connect:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(138, 43, 226, 0.5);
        }

        /* 頂部全螢幕按鈕樣式 */
        header button[onclick*="window.open"] {
            font-family: var(--font-stack);
            font-size: 13px;
            font-weight: 600;
            padding: 8px 16px;
            border-radius: 999px;
            background: rgba(255, 255, 255, 0.05);
            color: #ffffff;
            border: 1px solid rgba(255, 255, 255, 0.15);
            cursor: pointer;
            transition: all 0.2s;
        }

        header button[onclick*="window.open"]:hover {
            background: rgba(255, 255, 255, 0.1);
            border-color: rgba(255, 255, 255, 0.3);
        }

        /* 2. Main Content Container */
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 110px 20px 40px;
            text-align: center;
            flex: 1; /* 讓內容撐開，使 footer 留在最底部 */
        }

        .tagline {
            font-size: 56px;
            font-weight: 800;
            letter-spacing: -1px;
            margin-bottom: 15px;
            background: linear-gradient(135deg, #fff 30%, var(--secondary) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .subtagline {
            font-size: 18px;
            color: var(--text-muted);
            font-weight: 400;
            margin-bottom: 40px;
            max-width: 600px;
            margin-left: auto;
            margin-right: auto;
        }

        /* 🚀 外層容器保持 16:9，並一刀切掉多出來的藍條 */
        .iframe-container {
            width: 100%;
            max-width: 900px;
            margin: 0 auto 30px;
            border-radius: 16px;
            overflow: hidden; 
            background: var(--glass);
            border: 1px solid var(--border);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            position: relative;
            aspect-ratio: 16 / 9;
        }

        /* 🚀 高度故意加多，將 OnCyber 底部藍條擠出可視範圍 */
        .iframe-container iframe {
            width: 100%;
            height: calc(100% + 42px);
            border: none;
            display: block;
        }

        /* 3. Button Rows */
        .btn-row {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-top: 25px;
        }

        .btn {
            padding: 12px 28px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }

        .btn-primary {
            background: #ffffff;
            color: #000000;
            border: none;
        }

        .btn-primary:hover {
            background: rgba(255, 255, 255, 0.9);
            transform: translateY(-1px);
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.05);
            color: #ffffff;
            border: 1px solid var(--border);
        }

        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.1);
            border-color: rgba(255, 255, 255, 0.2);
            transform: translateY(-1px);
        }

        .ticket-note {
            margin-top: 25px;
            font-size: 12px;
            color: var(--text-muted);
        }

        /* 🌐 補回的 Social Media Footer 樣式 */
        footer {
            border-top: 1px solid var(--border);
            background: rgba(7, 2, 20, 0.5);
            padding: 30px 20px;
            text-align: center;
            margin-top: auto;
        }

        .social-links {
            display: flex;
            justify-content: center;
            gap: 25px;
            margin-bottom: 15px;
        }

        .social-links a {
            color: var(--text-muted);
            font-size: 20px;
            text-decoration: none;
            transition: color 0.2s, transform 0.2s;
        }

        .social-links a:hover {
            color: var(--secondary);
            transform: translateY(-2px);
        }

        .copyright {
            font-size: 12px;
            color: rgba(255, 255, 255, 0.3);
        }

        /* 4. Modal (Popup Box) */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(7, 2, 20, 0.85);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 2000;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
        }

        .modal-overlay.active {
            opacity: 1;
            pointer-events: auto;
        }

        .modal-box {
            background: #0f0926;
            border: 1px solid var(--border);
            padding: 40px;
            border-radius: 20px;
            max-width: 450px;
            width: 90%;
            text-align: center;
            box-shadow: 0 20px 50px rgba(0,0,0,0.6);
            transform: scale(0.95);
            transition: transform 0.3s ease;
        }

        .modal-overlay.active .modal-box {
            transform: scale(1);
        }

        .modal-icon {
            font-size: 40px;
            margin-bottom: 15px;
        }

        .modal-box h3 {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 12px;
            color: #fff;
        }

        .modal-box p {
            font-size: 14px;
            color: var(--text-muted);
            line-height: 1.6;
            margin-bottom: 25px;
        }

        .btn-modal-close {
            background: var(--primary);
            color: white;
            border: none;
            padding: 10px 24px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }

        .btn-modal-close:hover {
            background: #9d4edd;
        }

        /* 📱 手機版自適應 */
        @media (max-width: 900px) {
            header { 
                padding: 0 10px !important; 
                gap: 8px !important;
            }
            .header-right {
                gap: 8px !important;
            }

            .language-switch a[href*="global"],
            .language-switch span:last-of-type {
                display: none !important;
            }
            .language-switch {
                font-size: 11px !important;
                gap: 3px !important;
            }

            header button[onclick*="window.open"] {
                font-size: 0 !important;
                padding: 6px 10px !important;
            }
            header button[onclick*="window.open"]::after {
                content: "Live 🚀";
                font-size: 11px !important;
            }

            .btn-connect {
                font-size: 11px !important;
                padding: 6px 10px !important;
                white-space: nowrap !important;
            }

            .container { 
                padding-top: 85px; 
            }
            .tagline { 
                font-size: 36px; 
            }
        }
    </style>
</head>
<body>

    <!-- 1. Sticky Header -->
    <header>
        <a href="index.html">
            <img class="nav-logo" src="https://oncyber.io/neoxdynamic" alt="NeoX Logo">
        </a>
        <div class="header-right">
            <div class="language-switch">
                <a href="metaverse.html">EN</a>
                <span class="lang-sep">|</span>
                <a href="metaverse-zh.html" class="active">繁</a>
                <span class="lang-sep">|</span>
                <a href="metaverse-global.html">Global</a>
            </div>
            
            <button onclick="window.open('https://oncyber.io/neoxdynamic','_blank')">
                Fullscreen 🚀
            </button>

            <button class="btn-connect" id="connect-btn">Connect Wallet</button>
        </div>
    </header>

    <!-- 2. Main Area -->
    <div class="container">
        <h1 class="tagline">NeoX 元宇宙展覽</h1>
        <p class="subtagline">沉浸式虛擬展廳、數位藝術與動態視覺體驗</p>

        <!-- 🌐 3D 展覽 iframe 容器 -->
        <div class="iframe-container">
            <iframe 
                src="https://oncyber.io/neoxdynamic" 
                allow="fullscreen; xr-spatial-tracking; gyroscope; accelerometer;" 
                sandbox="allow-scripts allow-same-origin allow-popups allow-forms">
            </iframe>
        </div>

        <!-- 3. Bottom Action Buttons -->
        <div class="btn-row">
            <button class="btn btn-primary" onclick="openModal();">🎟️ 購買門票</button>
            <a class="btn btn-secondary" href="index.html">← 返回首頁</a>
        </div>

        <p class="ticket-note">
            💡 目前展覽開放免費探索。未來活動將逐步引入門票機制。
        </p>
    </div>

    <!-- 🌐 4. 補回的 Footer (包含 Social Media 連結) -->
    <footer>
        <div class="social-links">
            <a href="#" target="_blank" title="Twitter / X"><i class="fab fa-twitter"></i></a>
            <a href="#" target="_blank" title="Discord"><i class="fab fa-discord"></i></a>
            <a href="#" target="_blank" title="Telegram"><i class="fab fa-telegram-plane"></i></a>
            <a href="#" target="_blank" title="GitHub"><i class="fab fa-github"></i></a>
        </div>
        <div class="copyright">
            &copy; 2026 NeoX. 保留所有權利。
        </div>
    </footer>

    <!-- 5. Pop-up Ticket Modal -->
    <div class="modal-overlay" id="ticketModal">
        <div class="modal-box">
            <div class="modal-icon">✨</div>
            <h3>目前免費開放！</h3>
            <p>NeoX 創世元宇宙展覽現正處於公開測試階段，所有訪客均可免費入場探索。快進入展廳享受沉浸式虛擬藝術體驗吧！</p>
            <button class="btn-modal-close" onclick="closeModal();">開始探索</button>
        </div>
    </div>

    <script>
        function openModal() {
            document.getElementById('ticketModal').classList.add('active');
        }
        function closeModal() {
            document.getElementById('ticketModal').classList.remove('active');
        }
        document.getElementById('ticketModal').addEventListener('click', function(e) {
            if (e.target === this) closeModal();
        });
    </script>

</body>
</html>
