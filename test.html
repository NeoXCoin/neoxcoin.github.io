<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="icon" type="image/x-icon" href="/favicon.ico" />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <link rel="apple-touch-icon" href="/apple-touch-icon.png">

  <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Add NXC Token - NeoX</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-dark: #03010a;
            --primary: #a370ff;
            --secondary: #00ffcc;
            --glass: rgba(255, 255, 255, 0.03);
            --border: rgba(255, 255, 255, 0.08);
            --font-stack: 'Plus Jakarta Sans', sans-serif;
        }
        body { 
            margin: 0; 
            background: radial-gradient(circle at center, #110526 0%, #03010a 100%);
            font-family: var(--font-stack); color: #fff; text-align: center; padding: 120px 20px;
            min-height: 100vh; box-sizing: border-box;
        }
        .container { 
            max-width: 600px; margin: 0 auto; background: var(--glass); 
            border: 1px solid var(--border); padding: 40px; border-radius: 20px; 
            backdrop-filter: blur(15px); box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .logo { width: 60px; margin-bottom: 20px; }
        h1 { font-size: 32px; margin-bottom: 20px; background: linear-gradient(120deg, #fff, var(--primary)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .btn { display: block; width: 100%; padding: 15px; margin: 12px 0; border-radius: 12px; border: 1px solid var(--border); background: rgba(255,255,255,0.05); color: #fff; cursor: pointer; transition: 0.3s; font-weight: 600; }
        .btn:hover { border-color: var(--primary); background: rgba(163, 112, 255, 0.1); }
        .panel { margin-top: 30px; text-align: left; background: rgba(0,0,0,0.3); padding: 20px; border-radius: 12px; border: 1px solid var(--border); }
        .mrow { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 1px solid var(--border); font-size: 14px; }
        .copy-btn { background: none; border: 1px solid var(--secondary); color: var(--secondary); padding: 4px 10px; border-radius: 6px; cursor: pointer; font-size: 12px; }
        .back-link { display: inline-block; margin-top: 30px; color: var(--text-muted); text-decoration: none; opacity: 0.7; }
        .back-link:hover { opacity: 1; text-decoration: underline; }
    </style>
</head>
<body>
    <div class="container">
        <a href="index.html"><img src="https://neoxcoin.github.io/XNXC.png" class="logo"></a>
        <h1>Add NXC Token</h1>
        <button class="btn" onclick="addToken()">Add NXC to MetaMask (Auto)</button>
        <a class="btn" href="https://metamask.app.link/dapp/neoxcoin.github.io/add-to-wallet.html">Open in MetaMask App</a>
        
        <div class="panel">
            <div class="mrow"><span>Network:</span> <span>Base</span></div>
            <div class="mrow">
                <span>Contract:</span> 
                <span id="addr">0x9C17fDa33CBEe4aE3768252Fd62156034F42B40B</span>
                <button class="copy-btn" onclick="copyAddr()">Copy</button>
            </div>
            <div class="mrow"><span>Symbol:</span> <span>NXC</span></div>
        </div>
        <a href="index.html" class="back-link">← Back to Home</a>
    </div>

    <script>
        async function addToken() {
            try {
                await window.ethereum.request({ method: 'wallet_watchAsset', params: { type: 'ERC20', options: { address: '0x9C17fDa33CBEe4aE3768252Fd62156034F42B40B', symbol: 'NXC', decimals: 18 } } });
            } catch(e) { alert("Please connect via MetaMask."); }
        }
        function copyAddr() {
            navigator.clipboard.writeText("0x9C17fDa33CBEe4aE3768252Fd62156034F42B40B");
            alert("Address copied!");
        }
    </script>
</body>
</html>
