    <!-- 音訊背景音樂 -->
    <audio id="bgm" src="https://neoxcoin.github.io/puzzle-game-bright-casual-video-game-music-249202.mp3" loop preload="auto"></audio>

    <script>
        // 1. 影片漸顯邏輯
        (function(){
            const v = document.querySelector('.hero video');
            if(!v) return;
            function onReady(){ v.classList.add('loaded'); }
            if (v.readyState >= 2) { onReady(); } else {
                v.addEventListener('loadeddata', onReady, {once:true});
                v.addEventListener('canplay', onReady, {once:true});
            }
        })();

        // 2. 智能背景音訊引擎 (無切換按鈕，點擊畫面即優雅啟動)
        (function(){
            const bgm = document.getElementById('bgm');
            let hasInteracted = false;

            bgm.volume = 0;
            bgm.muted = true;
            bgm.play().catch(()=>{});

            function unlockAudio() {
                if(!hasInteracted) {
                    hasInteracted = true;
                    bgm.muted = false;
                    bgm.volume = 0.4;
                    bgm.play().catch(()=>{});
                }
                ['pointerdown', 'keydown'].forEach(ev => window.removeEventListener(ev, unlockAudio));
            }
            ['pointerdown', 'keydown'].forEach(ev => window.addEventListener(ev, unlockAudio, { once: true, passive: true }));

            function stopBgm(){
                try { bgm.pause(); } catch(e){}
                bgm.currentTime = 0;
            }

            // 當點擊進入 iframe 遊戲時全自動暫停背景 BGM
            document.querySelectorAll('.stop-bgm').forEach(a => {
                ['pointerdown', 'click'].forEach(ev => a.addEventListener(ev, stopBgm, {passive:true}));
            });

            window.addEventListener('pagehide', stopBgm);
            window.addEventListener('beforeunload', stopBgm);
            document.addEventListener('visibilitychange', () => {
                if (document.visibilityState === 'hidden') {
                    bgm.pause();
                } else if (document.visibilityState === 'visible' && hasInteracted) {
                    bgm.play().catch(()=>{});
                }
            });
        })();

        // 3. Web3 錢包連接邏輯
        const connectBtn = document.getElementById('connect-btn');
        async function checkConnection() {
            if (typeof window.ethereum !== 'undefined') {
                const accounts = await window.ethereum.request({ method: 'eth_accounts' });
                if (accounts.length > 0) { updateButton(accounts[0]); }
            }
        }
        function updateButton(address) {
            const shortAddress = address.substring(0, 6) + "..." + address.substring(address.length - 4);
            connectBtn.innerText = shortAddress;
            connectBtn.style.color = "#00ffcc";
            connectBtn.style.borderColor = "rgba(0, 255, 204, 0.6)";
        }
        connectBtn.addEventListener('click', async () => {
            if (typeof window.ethereum !== 'undefined') {
                try {
                    connectBtn.innerText = "連接中...";
                    const accounts = await window.ethereum.request({ method: 'eth_requestAccounts' });
                    updateButton(accounts[0]);
                } catch (error) {
                    console.error(error);
                    connectBtn.innerText = "連接錢包";
                }
            } else {
                alert("未偵測到 Web3 錢包。正在引導至 MetaMask 下載頁面...");
                window.open('https://metamask.io/download/', '_blank');
            }
        });
        window.addEventListener('DOMContentLoaded', checkConnection);
    </script>
