<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>NFT Collections - NeoX</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #a370ff;
            --secondary: #00ffcc;
            --bg-dark: #03010a;
            --glass: rgba(255, 255, 255, 0.03);
            --border: rgba(255, 255, 255, 0.08);
            --text-main: #ffffff;
            --text-muted: rgba(255, 255, 255, 0.7);
        }

        body { margin: 0; background: radial-gradient(circle at center, #110526 0%, #03010a 100%); font-family: 'Plus Jakarta Sans', sans-serif; color: var(--text-main); text-align: center; padding-top: 100px; }
        
        header { position: fixed; top: 0; width: 100%; height: 70px; display: flex; align-items: center; justify-content: space-between; padding: 0 50px; background: rgba(7, 2, 20, 0.6); backdrop-filter: blur(15px); border-bottom: 1px solid var(--border); z-index: 1000; box-sizing: border-box; }
        .nav-logo { height: 32px; }
        .btn-connect { padding: 8px 18px; border-radius: 999px; background: transparent; color: var(--secondary); border: 1px solid rgba(0, 255, 204, 0.3); font-weight: 600; cursor: pointer; }
        
        .container { max-width: 900px; margin: 0 auto; padding: 40px 20px; }
        .tagline { font-size: 42px; font-weight: 800; margin-bottom: 10px; background: linear-gradient(120deg, #fff, var(--primary)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        
        .nft-series { background: var(--glass); backdrop-filter: blur(15px); border: 1px solid var(--border); border-radius: 20px; padding: 30px; margin-bottom: 30px; text-align: left; }
        .nft-series h3 { color: var(--primary); margin-top: 0; }
        .nft-content-row { display: flex; flex-direction: row; gap: 24px; align-items: center; }
        .nft-media { flex: 0 0 240px; }
        .nft-media video, .nft-media img { width: 100%; border-radius: 12px; display: block; }
        
        .opensea-link { color: var(--primary); font-weight: 600; display: inline-block; margin-top: 10px; }
        
        footer { padding: 40px 0; margin-top: 50px; border-top: 1px solid var(--border); }
        .social-icons img { width: 36px; height: 36px; margin: 0 10px; filter: grayscale(100%) brightness(0.7); transition: 0.3s; }
        .social-icons img:hover { filter: grayscale(0%) brightness(1); transform: scale(1.1); }
        
        @media (max-width: 640px) { .nft-content-row { flex-direction: column; } .nft-media { width: 100%; } }
    </style>
</head>
<body>

    <header>
        <a href="index.html"><img class="nav-logo" src="https://neoxcoin.github.io/XNXC.png"></a>
        <button class="btn-connect" id="connect-btn">Connect Wallet</button>
    </header>

    <div class="container">
        <h1 class="tagline">NeoX NFT Projects</h1>
        <p style="color: var(--text-muted); margin-bottom: 50px;">Discover our exclusive digital collections</p>

        <!-- 範例：你可以按呢個結構加返你原本嗰啲 Video 同描述 -->
        <div class="nft-series">
            <h3>🏞️ NeoX Colorful Shan Shui</h3>
            <div class="nft-content-row">
                <div class="nft-media">
                    <video autoplay muted loop playsinline><source src="https://neoxcoin.github.io/NeoX%20Colorful%20Shan%20Shui.mp4" type="video/mp4"></video>
                </div>
                <div class="nft-info">
                    <p>Reimagining traditional Chinese landscape painting through futuristic light.</p>
                    <a href="https://opensea.io/collection/neox-colorful-shan-shui" target="_blank" class="opensea-link">View on OpenSea</a>
                </div>
            </div>
        </div>
        <!-- 記得按上面結構複製返你其他 NFT Series (Cosmic Visions, Abstract Realms 等) -->
    </div>

    <footer>
        <div class="social-icons">
            <a href="https://www.facebook.com/profile.php?id=61579442687473" target="_blank"><img src="https://neoxcoin.github.io/facebook.png"></a>
            <a href="https://x.com/neox__official" target="_blank"><img src="https://neoxcoin.github.io/twitter.png"></a>
        </div>
    </footer>

    <script>
        document.getElementById('connect-btn').addEventListener('click', async () => {
            const accounts = await window.ethereum.request({ method: 'eth_requestAccounts' });
            document.getElementById('connect-btn').innerText = accounts[0].substring(0,6) + "...";
        });
    </script>
</body>
</html>
