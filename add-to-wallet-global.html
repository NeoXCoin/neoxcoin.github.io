<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Add NXC to Wallet - Global</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">

    <script>
      function googleTranslateElementInit(){
        new google.translate.TranslateElement({
          pageLanguage: 'en', 
          includedLanguages: 'en,zh-TW,zh-CN,ja,ko,fr,de,es,pt,ru,ar,id,vi,th,it,tr,hi', 
          autoDisplay: false, 
          multilanguagePage: true 
        }, 'google_translate_element');
      }
    </script>
    <script src="https://translate.google.com/translate_a/element.js?cb=googleTranslateElementInit" defer></script>
    
    <style>
        :root {
            --bg-dark: #03010a;
            --text-main: #ffffff;
            --primary: #a370ff;
            --secondary: #00ffcc;
            --glass: rgba(255, 255, 255, 0.03);
            --border: rgba(255, 255, 255, 0.08);
        }
        body { margin: 0; background: radial-gradient(circle at center, #110526 0%, #03010a 100%); font-family: 'Plus Jakarta Sans', sans-serif; color: #fff; text-align: center; padding-top: 100px; padding-bottom: 50px; }
        
        /* Header 修正：確保手機兩側對齊 */
        header { position: fixed; top: 0; width: 100%; height: 70px; display: flex; align-items: center; justify-content: space-between; padding: 0 50px; background: rgba(7, 2, 20, 0.6); backdrop-filter: blur(15px); border-bottom: 1px solid var(--border); box-sizing: border-box; z-index: 1000; }
        .nav-logo { height: 32px; }
        
        /* 右側區域 */
        .header-right { display: flex; align-items: center; gap: 15px; }
        
        /* Custom Black Pill Styling for Google Widget */
        #google_translate_element {
          display: inline-block;
          padding: 2px 6px;
          border-radius: 20px;
          background: rgba(0, 0, 0, 0.4);
          border: 1px solid var(--border);
        }
        #google_translate_element .goog-te-gadget { font-size: 12px !important; color: #fff !important; }
        #google_translate_element .goog-te-gadget span { display: none !important; } /* 隱藏 Google 提供 字眼 */
        #google_translate_element select {
          background: transparent !important;
          color: #fff !important;
          border: none !important;
          font-size: 12px !important;
          padding: 4px 6px !important;
          outline: none !important;
          cursor: pointer;
        }

        .btn-connect { padding: 8px 18px; border-radius: 999px; background: transparent; color: var(--secondary); border: 1px solid rgba(0, 255, 204, 0.3); cursor: pointer; font-family: inherit; font-weight: 600; }

        .container { max-width: 500px; margin: 0 auto; background: var(--glass); border: 1px solid var(--border); padding: 40px; border-radius: 20px; backdrop-filter: blur(15px); }
        .title-box { display: flex; align-items: center; justify-content: center; gap: 15px; margin-bottom: 25px; }
        .title-logo { width: 45px; height: 45px; }
        h1 { font-size: 28px; margin: 0; background: linear-gradient(120deg, #fff, var(--primary)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        
        /* 動態變色按鈕 */
        .btn-main { display: block; width: 100%; padding: 15px; margin-bottom: 20px; border-radius: 12px; border: 1px solid rgba(163, 112, 255, 0.5); background: linear-gradient(120deg, #a370ff 0%, #00ffcc 50%, #a370ff 100%); background-size: 200% auto; color: white; font-weight: 700; cursor: pointer; font-size: 15px; animation: btnShimmer 3s linear infinite; }
        @keyframes btnShimmer { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }
        
        .panel { text-align: left; background: rgba(0,0,0,0.2); padding: 20px; border-radius: 12px; border: 1px solid var(--border); margin-top: 20px; }
        .mrow { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 1px solid var(--border); font-size: 14px; }
        .copy-btn { background: none; border: 1px solid var(--secondary); color: var(--secondary); padding: 2px 8px; border-radius: 4px; cursor: pointer; font-size: 11px; margin-left: 10px; }
        .back-link { display: block; margin-top: 30px; color: rgba(255,255,255,0.6); text-decoration: none; font-size: 14px; }

        @media (max-width: 600px) {
            header { padding: 0 15px; }
            .goog-te-gadget-simple { padding: 3px 6px !important; }
        }
    </style>
</head>
<body>

    <header>
        <a href="index-global.html"><img class="nav-logo" src="https://neoxcoin.github.io/XNXC.png"></a>
        <div class="header-right">
            <div id="google_translate_element"></div>
            <button class="btn-connect" id="connect-btn">Connect Wallet</button>
        </div>
    </header>

    <div class="container">
        <div class="title-box">
            <img src="https://neoxcoin.github.io/XNXC.png" class="title-logo">
            <h1>Add NXC Token</h1>
        </div>
        
        <button class="btn-main" onclick="addNxc()">Add NXC to MetaMask</button>
        
        <p style="font-size: 14px; color: rgba(255,255,255,0.6); margin-bottom: 20px;">
            MetaMask supports auto-add. For other wallets, use the details below:
        </p>

        <div class="panel">
            <div class="mrow"><span>Network:</span> <span>Base</span></div>
            <div class="mrow">
                <span>Contract:</span>
                <div style="display: flex; align-items: center; gap: 8px;">
                    <span id="addr" style="font-family: monospace; font-size: 13px;">0x9C17...2B40B</span>
                    <button class="copy-btn" onclick="copyAddr()">Copy</button>
                </div>
            </div>
            <div class="mrow"><span>Symbol:</span> <span>NXC</span></div>
            <div class="mrow"><span>Decimals:</span> <span>18</span></div>
        </div>

        <a href="index-global.html" class="back-link">← Back to Home</a>
    </div>

    <script type="text/javascript">
        function googleTranslateElementInit() {
            new google.translate.TranslateElement({pageLanguage: 'en', includedLanguages: 'en,zh-TW,zh-CN,ja,ko,fr,de,es,pt,ru,ar,id,vi,th,it,tr,hi', autoDisplay: false}, 'google_translate_element');
        }
    </script>
    <script type="text/javascript" src="//translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>

    <script>
        document.getElementById('connect-btn').addEventListener('click', async () => {
            const accounts = await window.ethereum.request({ method: 'eth_requestAccounts' });
            document.getElementById('connect-btn').innerText = accounts[0].substring(0,6) + "..." + accounts[0].substring(accounts[0].length - 4);
        });

        async function addNxc() {
            try {
                await window.ethereum.request({ 
                    method: 'wallet_watchAsset', 
                    params: { type: 'ERC20', options: { address: '0x9C17fDa33CBEe4aE3768252Fd62156034F42B40B', symbol: 'NXC', decimals: 18, image: 'https://neoxcoin.github.io/XNXC.png' } } 
                });
            } catch(e) { alert("Please open in MetaMask browser"); }
        }

        function copyAddr() {
            navigator.clipboard.writeText("0x9C17fDa33CBEe4aE3768252Fd62156034F42B40B");
            alert("Address copied!");
        }
    </script>
</body>
</html>
