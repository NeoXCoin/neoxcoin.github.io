<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>NeoX Coin (NXC) – 官方代幣資料</title>
    <meta name="description" content="NeoX Coin (NXC) 官方代幣資料頁面：包含 Base 主網合約地址、區塊鏈瀏覽器連結、專案簡介與官方聯絡方式。">
    
    <meta property="og:title" content="NeoX Coin (NXC) 官方代幣資料" />
    <meta property="og:description" content="NeoX 生態核心代幣 NXC，Base 主網合約地址與專案介紹。" />
    <meta property="og:image" content="https://neoxcoin.github.io/XNXC.png" />
    
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png">

    <style>
        body { margin: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "PingFang TC", "Noto Sans", Arial, sans-serif; background: #050814; color: #f5f5f5; line-height: 1.7; }
        .logo { position: absolute; top: 20px; left: 20px; width: 60px; opacity: 0.85; z-index: 999; }
        .wrap { max-width: 800px; margin: 0 auto; padding: 30px 20px 80px; }
        h1, h2 { font-weight: 600; margin-bottom: 10px; }
        h1 { font-size: 2rem; margin-top: 20px; }
        h2 { font-size: 1.3rem; margin-top: 28px; }
        .box { background: rgba(255,255,255,0.04); border-radius: 16px; padding: 24px; margin-top: 24px; border: 1px solid rgba(255,255,255,0.1); }
        
        /* 複製地址區塊 */
        .copy-container { display: flex; align-items: center; gap: 10px; background: rgba(0,0,0,0.4); padding: 12px; border-radius: 8px; margin-top: 10px; }
        code { font-family: SFMono-Regular, Consolas, monospace; word-break: break-all; flex-grow: 1; color: #4fd1ff; }
        .copy-btn { background: #4fd1ff; color: #050814; border: none; padding: 6px 12px; border-radius: 4px; cursor: pointer; font-weight: bold; font-size: 0.8rem; }
        .copy-btn:hover { background: #3abde6; }

        a { color: #4fd1ff; text-decoration: none; transition: 0.3s; }
        a:hover { opacity: 0.8; text-decoration: underline; }
        
        .link-btn { display: inline-block; margin-top: 8px; padding: 10px 16px; background: rgba(79, 209, 255, 0.1); border-radius: 8px; border: 1px solid #4fd1ff; }
        .footer-links { text-align: center; font-size: 0.9rem; opacity: 0.7; margin-top: 40px; }
        
        .coin-anim { animation: fadeInGlow 2s ease-out; }
        @keyframes fadeInGlow {
            0% { opacity: 0; transform: translateY(10px); box-shadow: 0 0 0 rgba(255,215,0,0); }
            100% { opacity: 1; box-shadow: 0 0 20px rgba(255,215,0,0.3); }
        }
    </style>
</head>
<body>

<a href="index-zh.html"><img class="logo" src="https://neoxcoin.io/apple-touch-icon.png" alt="NeoX Logo" /></a>

<div style="text-align:center; margin-top:80px;">
    <img src="https://neoxcoin.github.io/NeoXCoin360.gif" alt="NeoX Coin" class="coin-anim" style="width:140px; height:auto; border-radius:50%;">
</div>

<div class="wrap">
    <h1>NeoX Coin (NXC) – 官方代幣資料</h1>
    <p>NeoX Coin (NXC) 是 NeoX 生態系統的核心代幣，建基於 Base 主網。</p>

    <div class="box">
        <h2>合約地址</h2>
        <div class="copy-container">
            <code id="contract-addr">0x9C17fDa33CBEe4aE3768252Fd62156034F42B40B</code>
            <button class="copy-btn" onclick="copyAddr()">複製</button>
        </div>
        <p style="margin-top:15px;">
            <a href="https://basescan.org/token/0x9C17fDa33CBEe4aE3768252Fd62156034F42B40B" target="_blank">在 BaseScan 查看詳情 →</a>
        </p>
    </div>

    <div class="box">
        <h2>專案簡介</h2>
        <p>NeoX Coin (NXC) 串連了 NeoX 生態中的 NFT 系列與數位藝術。沒有預售或私人配售，公平啟動。</p>
    </div>

    <div class="box">
        <h2>官方連結</h2>
        <ul style="list-style: none; padding: 0;">
            <li><a class="link-btn" href="https://neoxcoin.io">官方網站</a></li>
            <li><a class="link-btn" href="https://x.com/xdenniswong">官方 X (Twitter)</a></li>
        </ul>
    </div>

    <div class="footer-links">
        © 2026 NeoXCoin | <a href="mailto:neoxcoin@outlook.com">聯絡我們</a>
    </div>
</div>

<script>
    function copyAddr() {
        const addr = document.getElementById("contract-addr").innerText;
        navigator.clipboard.writeText(addr).then(() => {
            const btn = document.querySelector('.copy-btn');
            btn.innerText = '已複製!';
            setTimeout(() => btn.innerText = '複製', 2000);
        });
    }
</script>

</body>
</html>
